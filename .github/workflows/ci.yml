name: CI

on:
  push:
    branches: [ production ]
  pull_request:
    branches: [ main ]

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: neko_test
          POSTGRES_USER: neko
          POSTGRES_PASSWORD: neko
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U neko -d neko_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      APP_BASE_URL: http://localhost:8000
      MOBILE_DEEPLINK: nekotrack://auth

      ANILIST_CLIENT_ID: dummy
      ANILIST_CLIENT_SECRET: dummy

      DATABASE_URL_DIRECT: postgresql+psycopg://neko:neko@localhost:5432/neko_test
      DATABASE_URL_POOLED: postgresql+psycopg://neko:neko@localhost:5432/neko_test

      JWT_SECRET: jwt_secret_for_tests_only
      TOKEN_ENC_KEY: ${{ secrets.TOKEN_ENC_KEY }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest -q