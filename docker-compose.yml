services:
  db:
    image: postgres:18-alpine
    container_name: neko_track_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: neko_track
      POSTGRES_USER: neko
      POSTGRES_PASSWORD: neko
    ports:
      - "5432:5432"
    volumes:
      - neko_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-bank_db}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  neko_pgdata: